name: Publish Go package

on:
  workflow_dispatch:
    inputs:
      publish-package:
        description: "Build and Release?"
        required: true
        type: choice
        default: "Build"
        options:
          - "Build"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.package.outputs.package-version }}
      serverless-compat-version: ${{ steps.serverlesscompatbinary.outputs.serverless-compat-version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: package
        run: |
          PACKAGE_VERSION=$(grep "Version" main.go | awk '{print $3}' | tr -d '"')
          echo "package-version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
      - id: serverlesscompatbinary
        run: |
          RESPONSE=$(curl -s "https://api.github.com/repos/datadog/serverless-components/releases")
          SERVERLESS_COMPAT_VERSION=$(echo "$RESPONSE" | jq -r --arg pattern "datadog-serverless-compat\/v[0-9]*\.[0-9]*\.[0-9]*" '.[] | select(.tag_name | test($pattern)) | .tag_name' | sort -V | tail -n 1)

          echo "Using version ${SERVERLESS_COMPAT_VERSION} of Serverless Compatibility Layer binary"
          echo "serverless-compat-version=$(echo "$SERVERLESS_COMPAT_VERSION" | jq -rR 'ltrimstr("datadog-serverless-compat/")')" >> "$GITHUB_OUTPUT"

          curl --output-dir ./temp/ --create-dirs -O -s -L "https://github.com/DataDog/serverless-components/releases/download/${SERVERLESS_COMPAT_VERSION}/datadog-serverless-compat.zip"
          unzip ./temp/datadog-serverless-agent.zip -d ./temp/datadog-serverless-agent

          mkdir -p datadogserverlesscompat/internal/bin/linux-amd64
          cp ./temp/datadog-serverless-agent/datadog-serverless-agent-linux-amd64/datadog-serverless-trace-mini-agent datadogserverlesscompat/internal/bin/linux-amd64/datadog-serverless-compat
      - name: Commit embedded binary
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add datadogserverlesscompat/internal/bin/linux-amd64/datadog-serverless-compat
          git commit -m "Add embedded binary for Serverless Compatibility Layer ${{ steps.serverlesscompatbinary.outputs.serverless-compat-version }}" || echo "No changes to commit"
          git push
      - uses: actions/setup-go@b22fbbc2921299758641fab08929b4ac52b32923
        with:
          go-version: '1.20.0'
      - run: |
          chmod +x datadogserverlesscompat/internal/bin/linux-amd64/datadog-serverless-compat
      - run: go mod tidy
      - run: go test -v ./...

  release:
    if: github.event.inputs.publish-package == 'Build and Publish'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    env:
      PACKAGE_VERSION: ${{ needs.build.outputs.package-version }}
      SERVERLESS_COMPAT_VERSION: ${{ needs.build.outputs.serverless-compat-version }}
    steps:
      - uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          body: "Uses [${{ env.SERVERLESS_COMPAT_VERSION }}](https://github.com/DataDog/serverless-components/releases/tag/${{ env.SERVERLESS_COMPAT_VERSION }}) of the Serverless Compatibility Layer binary."
          draft: true
          tag_name: "v${{ env.PACKAGE_VERSION }}"
          generate_release_notes: true
          make_latest: true
